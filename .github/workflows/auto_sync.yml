
name: Auto Sync to GitHub

on:
  push:
    branches:
      - main
    paths:
      - 'PRD_私人小说档案_MVP.md'
      - 'tag_dictionary.csv'
      - '.github/workflows/auto_sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push automated changes
        run: |
          git add PRD_私人小说档案_MVP.md tag_dictionary.csv .github/workflows/auto_sync.yml
          git diff --cached --quiet || (git commit -m "chore: auto sync updated files" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
